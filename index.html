<title>星影の占い — 鍵のかかった扉</title>
<style id="lockStyle">
  :root {
    --ink: #0B1026;
    --gold: #D9B45B;
    --gold-bright: #EED9A0;
    --moon: #F2EFE6;
    --mist: #8C94BA;
    --rose: #C97878;
    --serif: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif;
    --sans: "Hiragino Kaku Gothic ProN", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
  }
  html { background: var(--ink); height: 100%; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: var(--sans); color: var(--moon);
    background:
      radial-gradient(1px 1px at 12% 22%, rgba(238,217,160,0.9), transparent 100%),
      radial-gradient(1px 1px at 78% 12%, rgba(221,227,245,0.8), transparent 100%),
      radial-gradient(1.5px 1.5px at 62% 68%, rgba(221,227,245,0.7), transparent 100%),
      radial-gradient(1px 1px at 30% 80%, rgba(238,217,160,0.7), transparent 100%),
      radial-gradient(1px 1px at 88% 45%, rgba(221,227,245,0.75), transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 35%, rgba(221,227,245,0.6), transparent 100%),
      radial-gradient(1px 1px at 8% 60%, rgba(221,227,245,0.65), transparent 100%),
      radial-gradient(1px 1px at 70% 88%, rgba(238,217,160,0.6), transparent 100%),
      radial-gradient(circle at 50% 120%, #1B2450 0%, var(--ink) 60%);
    -webkit-font-smoothing: antialiased;
  }
  .gate {
    width: min(90vw, 380px); text-align: center; padding: 44px 32px 38px;
    border: 1px solid rgba(217, 180, 91, 0.3); border-radius: 10px;
    background: rgba(15, 20, 48, 0.82);
  }
  .keymark {
    width: 64px; height: 64px; margin: 0 auto 18px; border: 1px solid var(--gold);
    border-radius: 50%; display: grid; place-items: center; font-size: 26px; color: var(--gold-bright);
    background: radial-gradient(circle at 50% 35%, rgba(217, 180, 91, 0.18), transparent 70%);
  }
  h1 { font-family: var(--serif); font-weight: 600; font-size: 24px; letter-spacing: 0.18em; margin: 0 0 6px; }
  .sub { font-size: 12px; color: var(--mist); letter-spacing: 0.12em; margin: 0 0 26px; }
  .pw-row { display: flex; gap: 8px; }
  #pw {
    flex: 1; min-width: 0; font-family: var(--sans); font-size: 16px; color: var(--moon);
    background: var(--ink); border: 1px solid rgba(140, 148, 186, 0.45); border-radius: 4px;
    padding: 11px 12px; letter-spacing: 0.1em;
  }
  #pw:focus-visible { outline: 2px solid var(--gold-bright); outline-offset: 1px; }
  #openBtn {
    font-family: var(--sans); font-size: 13px; letter-spacing: 0.2em; color: var(--ink);
    background: var(--gold); border: none; border-radius: 4px; padding: 11px 20px;
    cursor: pointer; transition: background-color 0.2s; white-space: nowrap;
  }
  #openBtn:hover { background: var(--gold-bright); }
  #openBtn:focus-visible { outline: 2px solid var(--moon); outline-offset: 2px; }
  #openBtn:disabled { opacity: 0.5; cursor: wait; }
  #msg { font-size: 12px; letter-spacing: 0.08em; margin: 14px 0 0; min-height: 1.6em; color: var(--rose); }
  #msg.ok { color: var(--gold-bright); }
  .foot { margin-top: 22px; font-size: 10px; color: var(--mist); letter-spacing: 0.14em; line-height: 1.9; }
</style>

<div class="gate" role="main">
  <div class="keymark" aria-hidden="true">☾</div>
  <h1>星影の占い</h1>
  <p class="sub">この先は、鍵を持つ方だけの星の間です</p>
  <div class="pw-row">
    <input type="password" id="pw" placeholder="あいことば" autocomplete="current-password" aria-label="パスワード">
    <button id="openBtn" type="button">扉を開く</button>
  </div>
  <p id="msg" aria-live="polite"></p>
  <p class="foot">本文はパスワードで暗号化されています。<br>正しいあいことばを入れると、その場で復号されます。</p>
</div>

  var pwEl = document.getElementById("pw");
  var btn = document.getElementById("openBtn");
  var msg = document.getElementById("msg");

  function b64bytes(s) {
    var bin = atob(s), out = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  async function decrypt(pw) {
    var enc = new TextEncoder();
    var keyMat = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveBits"]);
    var bits = await crypto.subtle.deriveBits(
      { name: "PBKDF2", salt: b64bytes(P.salt), iterations: P.iter, hash: "SHA-256" }, keyMat, 256);
    var key = new Uint8Array(bits);
    var data = b64bytes(P.data);
    var out = new Uint8Array(data.length);
    var buf = new Uint8Array(36);
    buf.set(key, 0);
    var dv = new DataView(buf.buffer);
    var blocks = Math.ceil(data.length / 32);
    for (var i = 0; i < blocks; i++) {
      dv.setUint32(32, i);
      var ks = new Uint8Array(await crypto.subtle.digest("SHA-256", buf));
      var base = i * 32, n = Math.min(32, data.length - base);
      for (var j = 0; j < n; j++) out[base + j] = data[base + j] ^ ks[j];
    }
    var text = new TextDecoder().decode(out);
    if (text.slice(0, 5) !== "HSKG1") throw new Error("wrong password");
    return text.slice(5);
  }

  /* 復号したアプリをその場のDOMに展開する（document.writeはサンドボックスで
     拒否されることがあるため使わない）。スクリプトは要素として再注入し、
     CSPで実行されない環境では eval にフォールバックする。 */
  function boot(html) {
    var doc = new DOMParser().parseFromString(html, "text/html");
    var codes = [];
    doc.querySelectorAll("script").forEach(function (s) {
      codes.push(s.textContent);
      s.parentNode.removeChild(s);
    });
    if (doc.title) document.title = doc.title;
    var lockStyle = document.getElementById("lockStyle");
    if (lockStyle) lockStyle.parentNode.removeChild(lockStyle);
    doc.querySelectorAll("style").forEach(function (st) {
      var el = document.createElement("style");
      el.textContent = st.textContent;
      document.head.appendChild(el);
    });
    document.body.innerHTML = "";
    Array.prototype.slice.call(doc.body.children).forEach(function (n) {
      document.body.appendChild(document.importNode(n, true));
    });
    codes.forEach(function (code) {
      window.__hskgBooted = false;
      var flagged = code + "\n;window.__hskgBooted = true;";
      var sc = document.createElement("script");
      sc.textContent = flagged;
      document.body.appendChild(sc);
      if (!window.__hskgBooted) {
        try { (0, eval)(flagged); } catch (e) { console.error("boot fallback failed", e); }
      }
    });
  }

  async function tryUnlock(pw, silent) {
    if (!pw) return;
    btn.disabled = true;
    if (!silent) { msg.className = "ok"; msg.textContent = "扉を開いています…"; }
    try {
      var html = await decrypt(pw);
      try { sessionStorage.setItem("hskg_pw", pw); } catch (e) {}
      boot(html);
    } catch (e) {
      btn.disabled = false;
      if (!silent) {
        msg.className = "";
        msg.textContent = "あいことばが違うようです。もう一度お試しください。";
        pwEl.select();
      }
    }
  }

  btn.addEventListener("click", function () { tryUnlock(pwEl.value, false); });
  pwEl.addEventListener("keydown", function (e) { if (e.key === "Enter") tryUnlock(pwEl.value, false); });

  try {
    var saved = sessionStorage.getItem("hskg_pw");
    if (saved) tryUnlock(saved, true);
  } catch (e) {}
  pwEl.focus();
})();
